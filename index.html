<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Last Road - Gateway</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: #000 url('gate.jpg') no-repeat center center fixed; 
            background-size: cover;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        /* التغبيش فقط على الخلفية */
        .background-blur {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); 
            backdrop-filter: blur(3px);
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 2;
            text-align: center;
            color: #efefef;
            max-width: 500px;
        }

        /* صورة لين الواضحة */
        .lain-avatar {
            width: 180px; 
            height: 180px;
            border-radius: 50%;
            border: 1px solid rgba(0, 255, 136, 0.4);
            margin: 0 auto 30px auto;
            box-shadow: 0 0 40px rgba(0, 255, 136, 0.1);
            object-fit: cover;
            opacity: 0;
            animation: fadeInLain 3s ease-out forwards;
            display: block;
        }

        h1 {
            font-weight: 200;
            font-size: 1.3rem;
            min-height: 1.5em;
            margin-bottom: 50px;
            color: #eee;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .action-btn {
            background: transparent;
            border: 1px solid #444;
            color: #777;
            padding: 15px 25px;
            cursor: pointer;
            transition: 1.5s ease;
            opacity: 0;
            font-size: 0.95rem;
            font-family: 'Courier New', Courier, monospace;
        }

        .action-btn.visible {
            opacity: 1;
            border-color: #00ff88;
            color: #00ff88;
        }

        .action-btn:hover {
            box-shadow: 0 0 25px rgba(0, 255, 136, 0.3);
            background: rgba(0, 255, 136, 0.05);
        }

        @keyframes fadeInLain { 
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); } 
        }
    </style>
</head>
<body>

    <div class="background-blur"></div>

    <div class="content">
        <img src="lain.jpg" class="lain-avatar" id="avatar">
        <h1 id="typewriter"></h1>
        <button class="action-btn" id="nextBtn" onclick="goToRoom()">
            هل أنت متأكد من أنها فكرة جيدة أن ندخل هنا؟
        </button>
    </div>

    <script>
        // نظام "الحارس الذكي" - يفحص الذاكرة عند التحميل
        window.onload = function() {
            const savedKey = localStorage.getItem("the_last_road_key");
            
            // إذا كان المستخدم قد أدخل الكود الصحيح مسبقاً، يتخطى كل شيء
            if (savedKey === "unknown limit") {
                window.location.href = "base.html"; 
            } else {
                // إذا لم يدخل الكود من قبل، ابدأ القصة
                setTimeout(typeWriter, 1500);
            }
        };

        const text = "إنه مكان غريب... لكن مألوف قليلاً";
        let i = 0;
        
        function typeWriter() {
            if (i < text.length) {
                document.getElementById("typewriter").innerHTML += text.charAt(i);
                i++;
                setTimeout(typeWriter, 140); 
            } else {
                setTimeout(() => {
                    document.getElementById("nextBtn").classList.add("visible");
                }, 1000);
            }
        }

        function goToRoom() {
            window.location.href = "room.html";
        }
    </script>
</body>
</html>
