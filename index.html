<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Last Road</title>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: #000 url('gate.jpg') no-repeat center center fixed; 
            background-size: cover;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.95) 100%);
            backdrop-filter: blur(8px);
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 2;
            text-align: center;
            color: #efefef;
            max-width: 500px;
        }

        /* صورة لين الدائرية */
        .lain-avatar {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin: 0 auto 30px auto;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.05);
            object-fit: cover;
            opacity: 0;
            animation: fadeInAvatar 4s ease-in forwards;
            display: block;
        }

        h1 {
            font-weight: 200;
            font-size: 1.2rem;
            min-height: 1.5em;
            margin-bottom: 50px;
            color: #ccc;
            letter-spacing: 2px;
        }

        .google-btn {
            background: transparent;
            border: 1px solid #333;
            color: #666;
            padding: 10px 30px;
            cursor: pointer;
            transition: 1.5s ease;
            opacity: 0;
            font-size: 0.8rem;
        }

        .google-btn.visible {
            opacity: 1;
            border-color: #00ff88; /* لمسة سايبر أخضر */
            color: #00ff88;
        }

        @keyframes fadeInAvatar { to { opacity: 0.8; } }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <div class="content">
        <img src="lain.jpg" class="lain-avatar" id="avatar">
        <h1 id="typewriter"></h1>
        <button class="google-btn" id="loginBtn" onclick="loginWithGoogle()">
            INITIALIZE CONNECTION...
        </button>
    </div>

    <script>
        const text = "إنه مكان غريب... لكن مألوف قليلاً";
        let i = 0;
        function typeWriter() {
            if (i < text.length) {
                document.getElementById("typewriter").innerHTML += text.charAt(i);
                i++;
                setTimeout(typeWriter, 150);
            } else {
                setTimeout(() => {
                    document.getElementById("loginBtn").classList.add("visible");
                }, 1000);
            }
        }
        setTimeout(typeWriter, 1500);

        const firebaseConfig = {
            apiKey: "AIzaSyCK9fpEXgQ-5Yybwqj_MGq7BGJo0CdmUbk",
            authDomain: "://firebaseapp.com",
            projectId: "the-unknown-limit",
            storageBucket: "the-unknown-limit.firebasestorage.app",
            messagingSenderId: "876638500475",
            appId: "1:876638500475:web:e21bfafb46da2c9cbe94de"
        };
        firebase.initializeApp(firebaseConfig);

        function loginWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            firebase.auth().signInWithPopup(provider).then((result) => {
                alert("ACCESS GRANTED. Welcome, " + result.user.displayName);
            });
        }
    </script>
</body>
</html>
