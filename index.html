<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Last Road - Entrance</title>
    <style>
        body {
            margin: 0;
            background: #000;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }

        .terminal-text {
            font-size: 1.2rem;
            border-right: 2px solid #0f0;
            white-space: nowrap;
            overflow: hidden;
            width: 0;
            animation: typing 2s steps(30, end) forwards;
        }

        @keyframes typing {
            from { width: 0 }
            to { width: 100% }
        }

        .loading-dots:after {
            content: '...';
            animation: dots 1.5s steps(3, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60% { content: '...'; }
        }
    </style>
</head>
<body>

    <div id="boot-screen">
        <img src="lain.jpg" alt="Lain" style="width: 150px; filter: grayscale(100%) blur(1px); margin-bottom: 20px; opacity: 0.7;">
        <div class="terminal-text">جاري فحص الذاكرة العصبية<span class="loading-dots"></span></div>
    </div>

    <script>
        // دالة الفحص الفوري
        function checkAccess() {
            // نبحث عن القيمة التي يفترض أن يضعها ملف login.html عند النجاح
            const hasAccess = localStorage.getItem('access_granted');

            if (hasAccess === 'true') {
                // إذا كنت "معروف" للنظام، اذهب للمقر فوراً وتخطى الدراما
                console.log("Access Recognized. Redirecting...");
                window.location.href = "base.html";
            } else {
                // إذا لم تدخل الكود بعد، انتظر ثانيتين للجو السينمائي ثم اذهب للممر (room.html)
                console.log("Stranger detected. Proceeding to sequence...");
                setTimeout(() => {
                    window.location.href = "room.html";
                }, 2500); 
            }
        }

        // تشغيل الفحص بمجرد تحميل الصفحة
        window.onload = checkAccess;
    </script>
</body>
</html>
