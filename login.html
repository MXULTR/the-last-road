<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Last Road - Access Point</title>
    <style>
        body {
            margin: 0;
            background: #000;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .login-box {
            border: 1px solid #0f0;
            padding: 30px;
            background: rgba(0, 20, 0, 0.8);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
            text-align: center;
        }

        input {
            background: #000;
            border: 1px solid #0f0;
            color: #0f0;
            padding: 10px;
            width: 250px;
            text-align: center;
            font-size: 1.2rem;
            outline: none;
            margin-top: 20px;
        }

        .status {
            margin-top: 15px;
            font-size: 0.9rem;
            min-height: 20px;
        }

        img {
            width: 200px;
            filter: grayscale(100%);
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <img src="lain Bass.gif" alt="System Core">
        <div>INPUT ACCESS CODE:</div>
        
        <input type="password" id="passcode" placeholder="........" oninput="checkPasscode()">
        
        <div id="status" class="status">النظام بانتظار المفتاح...</div>
    </div>

    <audio id="bg-audio" src="mz.mp3" autoplay loop></audio>

    <script>
        // الكود السري الخاص بك
        const SECRET_KEY = "unknown limit";

        function checkPasscode() {
            const input = document.getElementById('passcode').value;
            const status = document.getElementById('status');

            if (input.toLowerCase() === SECRET_KEY) {
                status.innerText = "ACCESS GRANTED. SAVING PROTOCOL...";
                status.style.color = "#0f0";

                // الخطوة السحرية: حفظ تصريح الدخول للأبد في المتصفح
                localStorage.setItem('access_granted', 'true');

                // تأخير بسيط للجو السينمائي ثم الانتقال للمقر
                setTimeout(() => {
                    window.location.href = "base.html";
                }, 1500);
            } else if (input.length >= SECRET_KEY.length) {
                status.innerText = "ACCESS DENIED. TRY AGAIN.";
                status.style.color = "#f00";
            }
        }

        // محاولة تشغيل الصوت (بعض المتصفحات تطلب تفاعل أولاً)
        window.onclick = () => {
            document.getElementById('bg-audio').play();
        }
    </script>
</body>
</html>
