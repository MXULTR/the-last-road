<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unknown Limit - Auth</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: #000 url('lain Bass.gif') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        /* تأثير تفتيح العين ببطء عند الدخول */
        .eye-open {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 20;
            animation: openEye 4s ease-in-out forwards;
            pointer-events: none;
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); z-index: 1;
        }

        .login-container {
            position: relative; z-index: 10;
            text-align: center; color: #00ff88;
            width: 85%; max-width: 400px;
        }

        h1 {
            font-size: 1.2rem; font-weight: 200;
            margin-bottom: 30px; min-height: 1.5em;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
        }

        /* مربع الكود الشفاف الرهيب */
        input {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #333;
            border-bottom: 2px solid #00ff88;
            color: #00ff88;
            padding: 12px;
            width: 100%;
            text-align: center;
            font-size: 1rem;
            outline: none;
            transition: 0.5s;
            opacity: 0;
            animation: fadeIn 2s forwards 4s;
        }

        input:focus {
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
            border-color: #00ff88;
        }

        @keyframes openEye { 0% { opacity: 1; } 100% { opacity: 0.4; } }
        @keyframes fadeIn { to { opacity: 1; } }
    </style>
</head>
<body onclick="startExperience()">

    <div class="eye-open"></div>
    <div class="overlay"></div>

    <div class="login-container">
        <h1 id="typewriter"></h1>
        <!-- مربع إدخال الكود -->
        <input type="text" id="passcode" placeholder="Enter the key..." oninput="checkKey(this)">
    </div>

    <!-- موسيقى mz.mp3 -->
    <audio id="bgMusic" loop>
        <source src="mz.mp3" type="audio/mpeg">
    </audio>

    <script>
        let i = 0;
        const message = "تحتاج للمفتاح يا خوي...";
        let musicStarted = false;

        // تشغيل الموسيقى والبدء عند أول لمسة
        function startExperience() {
            if (!musicStarted) {
                document.getElementById('bgMusic').play();
                musicStarted = true;
                typeWriter();
            }
        }

        function typeWriter() {
            if (i < message.length) {
                document.getElementById("typewriter").innerHTML += message.charAt(i);
                i++;
                setTimeout(typeWriter, 120);
            }
        }

        // فحص الكود وحفظه
        function checkKey(input) {
            if (input.value.toLowerCase() === "unknown limit") {
                // حفظ المفتاح في ذاكرة الجوال للأبد
                localStorage.setItem("the_last_road_key", "unknown limit");
                
                // وميض أخضر ثم انتقال للمقر
                document.body.style.backgroundColor = "#00ff88";
                setTimeout(() => {
                    window.location.href = "base.html";
                }, 500);
            }
        }
    </script>
</body>
</html>
