<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Passage - The Last Road</title>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            background: #000 url('subaru.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Courier New', Courier, monospace;
            display: flex; flex-direction: column; justify-content: flex-end;
            align-items: center; overflow: hidden;
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); z-index: 1;
        }

        /* حاوية الحوار والخيارات */
        .ui-container {
            position: relative; z-index: 2;
            width: 95%; max-width: 600px;
            margin-bottom: 40px;
            display: flex; flex-direction: column; gap: 10px;
        }

        /* صندوق الحوار الرئيسي */
        .main-dialogue {
            background: rgba(0, 0, 0, 0.85);
            border: 1.5px solid #00ff88;
            padding: 20px;
            color: #fff;
            font-size: 1rem;
            line-height: 1.5;
            text-align: center;
            min-height: 60px;
            display: flex; align-items: center; justify-content: center;
        }

        /* حاوية أزرار الخيارات (تحت الصندوق) */
        .choices-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* تقسيم متساوي للنصفين */
            gap: 10px;
            opacity: 0; /* تختفي لين يخلص الكلام */
            transition: 1s ease;
        }

        .choice-btn {
            background: rgba(0, 0, 0, 0.9);
            border: 1.5px solid #444;
            color: #888;
            padding: 15px 5px;
            cursor: pointer;
            font-size: 0.85rem;
            text-align: center;
            transition: 0.3s;
            display: flex; align-items: center; justify-content: center;
        }

        .choice-btn:hover {
            border-color: #00ff88;
            color: #00ff88;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
        }

        .visible { opacity: 1; }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <div class="ui-container">
        <!-- المربع الأساسي حق الكلام -->
        <div class="main-dialogue" id="dialogueText"></div>

        <!-- المربعين اللي تحت (الخيارات) -->
        <div class="choices-grid" id="choiceContainer">
            <button class="choice-btn" onclick="goBack()">اممم... لا أظن أني أريد ذلك</button>
            <button class="choice-btn" onclick="loginWithGoogle()">لا مشكلة، سأدخل</button>
        </div>
    </div>

    <script>
        const textToType = "اوه... ارى انه يجب علي تأكد امر دخولي... حسنا سا احاول";
        let i = 0;

        function typeWriter() {
            if (i < textToType.length) {
                document.getElementById("dialogueText").innerHTML += textToType.charAt(i);
                i++;
                setTimeout(typeWriter, 80);
            } else {
                document.getElementById("choiceContainer").classList.add("visible");
            }
        }

        window.onload = typeWriter;

        // إعدادات Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCK9fpEXgQ-5Yybwqj_MGq7BGJo0CdmUbk",
            authDomain: "://firebaseapp.com",
            projectId: "the-unknown-limit",
            storageBucket: "the-unknown-limit.firebasestorage.app",
            messagingSenderId: "876638500475",
            appId: "1:876638500475:web:e21bfafb46da2c9cbe94de"
        };
        firebase.initializeApp(firebaseConfig);

        function loginWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            firebase.auth().signInWithPopup(provider).then((result) => {
                alert("ACCESS GRANTED: " + result.user.email);
                // هنا بنوديه لصفحة الـ 80% لاحقاً
            });
        }

        function goBack() {
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
