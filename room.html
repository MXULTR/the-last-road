<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Entrance - The Last Road</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            /* الخلفية المتحركة اللي ضفتها */
            background: #000 url('entrance.gif') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex; justify-content: center; align-items: flex-end;
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); z-index: 1;
        }

        /* حاوية الحوار (RPG Style) */
        .ui-box {
            position: relative; z-index: 5;
            width: 90%; max-width: 650px;
            margin-bottom: 50px;
            display: flex; flex-direction: column; gap: 15px;
        }

        /* صندوق الكلام */
        .dialogue-main {
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid #444;
            padding: 20px;
            color: #efefef;
            text-align: center;
            font-size: 1.1rem;
            min-height: 60px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* حاوية الخيارات */
        .choices-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            opacity: 0;
            transition: 1.5s ease;
        }

        .choice-item {
            background: rgba(10, 10, 10, 0.95);
            border: 1px solid #333;
            color: #888;
            padding: 15px;
            cursor: pointer;
            text-align: center;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .choice-item:hover {
            border-color: #00ff88;
            color: #fff;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.1);
        }

        .visible { opacity: 1; }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <div class="ui-box">
        <!-- النص اللي ينكتب حرف حرف -->
        <div class="dialogue-main" id="dialogueText"></div>

        <!-- الأزرار اللي تنقلك للمسارات المختلفة -->
        <div class="choices-grid" id="choiceContainer">
            <!-- يمين: يوديك لصفحة الكود (login.html) -->
            <button class="choice-item" onclick="window.location.href='login.html'">أظن أني سأستمر بالتقدم</button>
            
            <!-- يسار: يوديك لصفحة سوبارو الحزين (refused.html) -->
            <button class="choice-item" onclick="window.location.href='refused.html'">ناه أظن أني أريد العودة يبدو مشبوه جداً</button>
        </div>
    </div>

    <script>
        const textToType = "اوه المدخل من هناك... هل اعود ادراجي ام استمر؟";
        let i = 0;
        function typeWriter() {
            if (i < textToType.length) {
                document.getElementById("dialogueText").innerHTML += textToType.charAt(i);
                i++;
                setTimeout(typeWriter, 120);
            } else {
                document.getElementById("choiceContainer").classList.add("visible");
            }
        }
        window.onload = typeWriter;
    </script>
</body>
</html>
