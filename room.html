<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Passage - The Last Road</title>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            background: #000 url('subaru.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Courier New', Courier, monospace;
            display: flex; flex-direction: column; justify-content: flex-end;
            align-items: center; overflow: hidden;
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); z-index: 1;
        }

        /* صندوق الحوار (RPG Style) */
        .dialogue-box {
            position: relative; z-index: 2;
            width: 90%; max-width: 700px;
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid #00ff88;
            padding: 25px;
            margin-bottom: 50px;
            border-radius: 5px;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
        }

        .text {
            color: #fff; font-size: 1.1rem; line-height: 1.6;
            margin-bottom: 25px; min-height: 3em;
        }

        /* أزرار الخيارات */
        .choices {
            display: flex; justify-content: space-around;
            opacity: 0; transition: 1s ease;
        }

        .choice-btn {
            background: transparent; border: 1px solid #444;
            color: #aaa; padding: 10px 20px; cursor: pointer;
            font-size: 0.9rem; transition: 0.3s;
        }

        .choice-btn:hover {
            border-color: #00ff88; color: #00ff88;
            background: rgba(0, 255, 136, 0.05);
        }

        .visible { opacity: 1; }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <div class="dialogue-box">
        <div class="text" id="dialogueText"></div>
        <div class="choices" id="choiceContainer">
            <button class="choice-btn" onclick="goBack()">اممم... لا أظن أني أريد ذلك</button>
            <button class="choice-btn" onclick="loginWithGoogle()">لا مشكلة، سأدخل</button>
        </div>
    </div>

    <script>
        const textToType = "اوه... ارى انه يجب علي تأكد امر دخولي... حسنا سا احاول";
        let i = 0;

        function typeWriter() {
            if (i < textToType.length) {
                document.getElementById("dialogueText").innerHTML += textToType.charAt(i);
                i++;
                setTimeout(typeWriter, 100);
            } else {
                document.getElementById("choiceContainer").classList.add("visible");
            }
        }

        window.onload = typeWriter;

        // إعدادات Firebase (نفس كودك السابق)
        const firebaseConfig = {
            apiKey: "AIzaSyCK9fpEXgQ-5Yybwqj_MGq7BGJo0CdmUbk",
            authDomain: "://firebaseapp.com",
            projectId: "the-unknown-limit",
            storageBucket: "the-unknown-limit.firebasestorage.app",
            messagingSenderId: "876638500475",
            appId: "1:876638500475:web:e21bfafb46da2c9cbe94de"
        };
        firebase.initializeApp(firebaseConfig);

        function loginWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            firebase.auth().signInWithPopup(provider).then((result) => {
                // هنا مستقبلاً نوجههم لـ "لب المشروع" الحقيقي
                alert("تم التحقق. أهلاً بك في ممر The Last Road");
            });
        }

        function goBack() {
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
