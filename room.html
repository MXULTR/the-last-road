<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Passage - The Last Road</title>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: #000 url('subaru.jpg') no-repeat center center;
            background-size: 100% 100%; /* يجبر الصورة على ملء كامل الشاشة */
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        /* حاوية الواجهة الموزونة فوق المربعات الخضراء في جهة اليمين */
        .ui-overlay {
            position: absolute;
            top: 29%;    /* الارتفاع من الأعلى */
            right: 7.2%; /* القرب من الجهة اليمنى */
            width: 34.5%; /* عرض الحاوية لتطابق المربعات في الصورة */
            display: flex;
            flex-direction: column;
            z-index: 5;
        }

        .dialogue-text {
            color: #00ff88;
            font-size: 1.2vw; /* حجم الخط يتناسب مع عرض الشاشة */
            line-height: 1.3;
            text-align: center;
            min-height: 65px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5px;
            margin-bottom: 23px; /* المسافة الفاصلة للمربعات التي تحتها */
            font-weight: bold;
        }

        .choices-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            opacity: 0;
            transition: 1.5s ease;
        }

        .choice-btn {
            background: transparent;
            border: none;
            color: #ffffff;
            font-size: 1vw;
            cursor: pointer;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: 0.3s;
        }

        .choice-btn:hover {
            color: #00ff88;
            text-shadow: 0 0 10px #00ff88;
        }

        .visible { opacity: 1; }
    </style>
</head>
<body>

    <div class="ui-overlay">
        <div class="dialogue-text" id="dialogueText"></div>
        <div class="choices-row" id="choiceContainer">
            <button class="choice-btn" onclick="loginWithGoogle()">سأدخل</button>
            <button class="choice-btn" onclick="goBack()">لست مستعداً</button>
        </div>
    </div>

    <script>
        const textToType = "اوه... ارى انه يجب علي تأكد امر دخولي... حسنا سا احاول";
        let i = 0;
        function typeWriter() {
            if (i < textToType.length) {
                document.getElementById("dialogueText").innerHTML += textToType.charAt(i);
                i++;
                setTimeout(typeWriter, 100);
            } else {
                setTimeout(() => {
                    document.getElementById("choiceContainer").classList.add("visible");
                }, 800);
            }
        }
        window.onload = typeWriter;

        // إعدادات Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCK9fpEXgQ-5Yybwqj_MGq7BGJo0CdmUbk",
            authDomain: "://firebaseapp.com",
            projectId: "the-unknown-limit",
            storageBucket: "the-unknown-limit.firebasestorage.app",
            messagingSenderId: "876638500475",
            appId: "1:876638500475:web:e21bfafb46da2c9cbe94de"
        };
        firebase.initializeApp(firebaseConfig);

        function loginWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            firebase.auth().signInWithPopup(provider).then((result) => {
                alert("ACCESS GRANTED. Welcome to The Last Road.");
            });
        }
        function goBack() { window.location.href = "index.html"; }
    </script>
</body>
</html>
