<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Passage - The Last Road</title>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            background: #000 url('subaru.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Courier New', Courier, monospace;
            display: flex; justify-content: center;
            overflow: hidden;
        }

        /* حاوية التحكم الكاملة في موقع النصوص */
        .game-interface {
            position: absolute;
            bottom: 12%; /* هذا الرقم يرفع وينزل كل شيء عشان يجي فوق المستطيل اللي في الصورة */
            width: 90%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 15px; /* المسافة بين نص الحوار والأزرار */
            z-index: 2;
        }

        /* نص الحوار - بدون خلفية ولا حدود لأنه بيدخل في مستطيل الصورة */
        .dialogue-text {
            color: #efefef;
            font-size: 1.1rem;
            text-align: center;
            min-height: 80px;
            padding: 10px;
            text-shadow: 1px 1px 2px #000; /* عشان يوضح الكلام فوق الصورة */
        }

        /* حاوية الأزرار - نوزنها فوق المربعين اللي تحت */
        .choices-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px; /* جرب تغير هذا الرقم لين يركب الزرين فوق المربعات بالصورة */
            opacity: 0;
            transition: 1s ease;
        }

        .choice-btn {
            background: transparent; /* شفاف تماماً */
            border: none; /* بدون حدود */
            color: #888;
            padding: 15px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.3s;
            text-align: center;
        }

        .choice-btn:hover {
            color: #00ff88;
            text-shadow: 0 0 10px #00ff88;
        }

        .visible { opacity: 1; }
    </style>
</head>
<body>

    <div class="game-interface">
        <!-- الكلام بيدخل هنا (فوق مستطيل الصورة الكبير) -->
        <div class="dialogue-text" id="dialogueText"></div>

        <!-- الأزرار بتركب هنا (فوق المربعين الصغار) -->
        <div class="choices-area" id="choiceContainer">
            <button class="choice-btn" onclick="loginWithGoogle()">لا مشكلة، سأدخل</button>
            <button class="choice-btn" onclick="goBack()">اممم... لا أظن أني أريد ذلك</button>
        </div>
    </div>

    <script>
        const textToType = "اوه... ارى انه يجب علي تأكد امر دخولي... حسنا سا احاول";
        let i = 0;

        function typeWriter() {
            if (i < textToType.length) {
                document.getElementById("dialogueText").innerHTML += textToType.charAt(i);
                i++;
                setTimeout(typeWriter, 100);
            } else {
                document.getElementById("choiceContainer").classList.add("visible");
            }
        }
        window.onload = typeWriter;

        const firebaseConfig = {
            apiKey: "AIzaSyCK9fpEXgQ-5Yybwqj_MGq7BGJo0CdmUbk",
            authDomain: "://firebaseapp.com",
            projectId: "the-unknown-limit",
            storageBucket: "the-unknown-limit.firebasestorage.app",
            messagingSenderId: "876638500475",
            appId: "1:876638500475:web:e21bfafb46da2c9cbe94de"
        };
        firebase.initializeApp(firebaseConfig);

        function loginWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            firebase.auth().signInWithPopup(provider).then((result) => {
                alert("تم التحقق. أهلاً بك.");
            });
        }

        function goBack() { window.location.href = "index.html"; }
    </script>
</body>
</html>
