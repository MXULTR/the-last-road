<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Passage - The Last Road</title>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: #000 url('subaru.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); z-index: 1;
        }

        /* حاوية الواجهة المركزية */
        .game-interface {
            position: relative; z-index: 5;
            width: 90%; max-width: 500px;
            display: flex; flex-direction: column; gap: 15px;
        }

        /* المربع الكبير للحوار (نحن صنعناه بالكود) */
        .dialogue-box {
            background: rgba(0, 20, 0, 0.85); /* لون أسود مائل للأخضر السايبر */
            border: 2px solid #00ff88;
            padding: 20px;
            color: #00ff88;
            font-size: 1.1rem;
            text-align: center;
            min-height: 80px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
        }

        /* حاوية المربعين الصغيرين (الخيارات) */
        .choices-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            opacity: 0;
            transition: 1.5s ease;
        }

        .choice-card {
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #444;
            color: #fff;
            padding: 15px;
            cursor: pointer;
            text-align: center;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .choice-card:hover {
            border-color: #00ff88;
            color: #00ff88;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
            transform: translateY(-3px);
        }

        .visible { opacity: 1; }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <div class="game-interface">
        <!-- مربع الحوار اللي سويناه بالكود -->
        <div class="dialogue-box" id="dialogueText"></div>

        <!-- المربعين اللي تحت (الخيارات) -->
        <div class="choices-container" id="choiceContainer">
            <button class="choice-card" onclick="loginWithGoogle()">سأدخل</button>
            <button class="choice-card" onclick="goBack()">لست مستعداً</button>
        </div>
    </div>

    <script>
        const textToType = "اوه... ارى انه يجب علي تأكد امر دخولي... حسنا سا احاول";
        let i = 0;
        function typeWriter() {
            if (i < textToType.length) {
                document.getElementById("dialogueText").innerHTML += textToType.charAt(i);
                i++;
                setTimeout(typeWriter, 100);
            } else {
                document.getElementById("choiceContainer").classList.add("visible");
            }
        }
        window.onload = typeWriter;

        const firebaseConfig = {
            apiKey: "AIzaSyCK9fpEXgQ-5Yybwqj_MGq7BGJo0CdmUbk",
            authDomain: "://firebaseapp.com",
            projectId: "the-unknown-limit",
            storageBucket: "the-unknown-limit.firebasestorage.app",
            messagingSenderId: "876638500475",
            appId: "1:876638500475:web:e21bfafb46da2c9cbe94de"
        };
        firebase.initializeApp(firebaseConfig);

        function loginWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            firebase.auth().signInWithPopup(provider).then((result) => {
                alert("تم التحقق بنجاح. أهلاً بك يا بطل.");
            });
        }
        function goBack() { window.location.href = "index.html"; }
    </script>
</body>
</html>
