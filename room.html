<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Entrance - The Last Road</title>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: #000 url('entrance.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex; justify-content: center; align-items: flex-end;
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); z-index: 1;
        }

        /* حاوية الحوار السفلي (RPG Style) */
        .ui-box {
            position: relative; z-index: 5;
            width: 90%; max-width: 650px;
            margin-bottom: 40px;
            display: flex; flex-direction: column; gap: 15px;
        }

        /* صندوق الكلام الرئيسي */
        .dialogue-main {
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #555;
            padding: 20px;
            color: #ccc;
            text-align: center;
            font-size: 1.1rem;
            min-height: 60px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* حاوية خيارات اليمين واليسار */
        .choices-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            opacity: 0;
            transition: 1.5s ease;
        }

        .choice-item {
            background: rgba(20, 20, 20, 0.95);
            border: 1px solid #333;
            color: #777;
            padding: 15px;
            cursor: pointer;
            text-align: center;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .choice-item:hover {
            border-color: #ff3333; /* أحمر خفيف للغموض */
            color: #fff;
            box-shadow: 0 0 15px rgba(255, 51, 51, 0.2);
        }

        .visible { opacity: 1; }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <div class="ui-box">
        <!-- الحوار اللي ينكتب -->
        <div class="dialogue-main" id="dialogueText"></div>

        <!-- الأزرار الموزونة -->
        <div class="choices-grid" id="choiceContainer">
            <!-- يمين: تقدم (قوقل) -->
            <button class="choice-item" onclick="loginWithGoogle()">أظن أني سأستمر بالتقدم</button>
            <!-- يسار: عودة (صفحة مسدودة) -->
            <button class="choice-item" onclick="goAway()">ناه أظن أني أريد العودة يبدو مشبوه جداً</button>
        </div>
    </div>

    <script>
        const textToType = "اوه المدخل من هناك... هل اعود ادراجي ام استمر؟";
        let i = 0;
        function typeWriter() {
            if (i < textToType.length) {
                document.getElementById("dialogueText").innerHTML += textToType.charAt(i);
                i++;
                setTimeout(typeWriter, 120);
            } else {
                document.getElementById("choiceContainer").classList.add("visible");
            }
        }
        window.onload = typeWriter;

        // إعدادات Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCK9fpEXgQ-5Yybwqj_MGq7BGJo0CdmUbk",
            authDomain: "://firebaseapp.com",
            projectId: "the-unknown-limit",
            storageBucket: "the-unknown-limit.firebasestorage.app",
            messagingSenderId: "876638500475",
            appId: "1:876638500475:web:e21bfafb46da2c9cbe94de"
        };
        firebase.initializeApp(firebaseConfig);

        function loginWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            firebase.auth().signInWithPopup(provider).then((result) => {
                alert("تم التوثيق. أهلاً بك في عالم The Last Road");
            });
        }

        function goAway() {
            // هنا بنوديه للصفحة المسدودة (العتاب) لاحقاً
            window.location.href = "refused.html";
        }
    </script>
</body>
</html>
