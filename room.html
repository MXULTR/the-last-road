<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Passage - The Last Road</title>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            background: #000 url('subaru.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        /* حاوية الواجهة - وضعناها في جهة اليمين فوق المربعات */
        .ui-overlay {
            position: absolute;
            top: 13%;    /* تحكم في الارتفاع من هنا */
            right: 8%;   /* تحكم في القرب من الحافة اليمنى من هنا */
            width: 38%;  /* عرض الحاوية لتناسب المربعات */
            display: flex;
            flex-direction: column;
            z-index: 5;
        }

        /* مربع الحوار الكبير (فوق المربع الأخضر العلوي) */
        .dialogue-text {
            color: #00ff88;
            font-size: 1.1vw; /* حجم الخط يتغير مع الشاشة */
            line-height: 1.4;
            text-align: center;
            height: 80px; /* طول المربع العلوي تقريباً */
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            margin-bottom: 25px; /* المسافة بين المربع الكبير والصغيرين */
        }

        /* حاوية الأزرار (فوق المربعين الصغيرين) */
        .choices-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            opacity: 0;
            transition: 1s ease;
        }

        .choice-btn {
            background: transparent;
            border: none;
            color: #fff;
            font-size: 0.8vw;
            cursor: pointer;
            height: 40px; /* طول المربعات الصغيرة */
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }

        .choice-btn:hover {
            color: #00ff88;
            text-shadow: 0 0 10px #00ff88;
        }

        .visible { opacity: 1; }
    </style>
</head>
<body>

    <div class="ui-overlay">
        <!-- النص داخل المربع الكبير -->
        <div class="dialogue-text" id="dialogueText"></div>

        <!-- الخيارات داخل المربعين الصغيرين -->
        <div class="choices-row" id="choiceContainer">
            <!-- اليمين: قبول -->
            <button class="choice-btn" onclick="loginWithGoogle()">لا مشكلة، سأدخل</button>
            <!-- اليسار: رفض -->
            <button class="choice-btn" onclick="goBack()">لا، لست مستعداً</button>
        </div>
    </div>

    <script>
        const textToType = "اوه... ارى انه يجب علي تأكد امر دخولي... حسنا سا احاول";
        let i = 0;

        function typeWriter() {
            if (i < textToType.length) {
                document.getElementById("dialogueText").innerHTML += textToType.charAt(i);
                i++;
                setTimeout(typeWriter, 100);
            } else {
                document.getElementById("choiceContainer").classList.add("visible");
            }
        }
        window.onload = typeWriter;

        const firebaseConfig = {
            apiKey: "AIzaSyCK9fpEXgQ-5Yybwqj_MGq7BGJo0CdmUbk",
            authDomain: "://firebaseapp.com",
            projectId: "the-unknown-limit",
            storageBucket: "the-unknown-limit.firebasestorage.app",
            messagingSenderId: "876638500475",
            appId: "1:876638500475:web:e21bfafb46da2c9cbe94de"
        };
        firebase.initializeApp(firebaseConfig);

        function loginWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            firebase.auth().signInWithPopup(provider).then((result) => {
                alert("تم التحقق. جاري نقلك لقلب الشغل...");
            });
        }

        function goBack() { window.location.href = "index.html"; }
    </script>
</body>
</html>
