<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Passage - The Last Road</title>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            /* جعل الصورة تغطي كامل الشاشة بدقة */
            background: #000 url('subaru.jpg') no-repeat center center fixed;
            background-size: cover; 
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            justify-content: flex-end; /* دفع المحتوى لجهة اليمين */
            align-items: flex-start;
        }

        /* حاوية النصوص - موزونة فوق المربعات الخضراء */
        .ui-overlay {
            position: absolute;
            top: 21%;    /* الارتفاع عن فوق */
            right: 5%;   /* البعد عن الحافة اليمنى */
            width: 32%;  /* عرض الحاوية لتناسب مستطيل الصورة */
            display: flex;
            flex-direction: column;
            z-index: 5;
        }

        /* نص الحوار (فوق المربع الأخضر الكبير) */
        .dialogue-text {
            color: #00ff88;
            font-size: 14px; /* حجم خط مناسب للجوال */
            line-height: 1.4;
            text-align: center;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5px;
            margin-bottom: 22px; /* المسافة للمربعات اللي تحتها */
            font-weight: bold;
        }

        /* حاوية الأزرار (فوق المربعات الصغيرة) */
        .choices-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            opacity: 0;
            transition: 1s ease;
        }

        .choice-btn {
            background: transparent;
            border: none;
            color: #ffffff;
            font-size: 11px;
            cursor: pointer;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: 0.3s;
        }

        .choice-btn:hover {
            color: #00ff88;
            text-shadow: 0 0 8px #00ff88;
        }

        .visible { opacity: 1; }
    </style>
</head>
<body>

    <div class="ui-overlay">
        <!-- النص داخل المربع الكبير -->
        <div class="dialogue-text" id="dialogueText"></div>

        <!-- الخيارات داخل المربعين الصغيرين -->
        <div class="choices-row" id="choiceContainer">
            <button class="choice-btn" onclick="loginWithGoogle()">سأدخل</button>
            <button class="choice-btn" onclick="goBack()">لست مستعداً</button>
        </div>
    </div>

    <script>
        const textToType = "اوه... ارى انه يجب علي تأكد امر دخولي... حسنا سا احاول";
        let i = 0;

        function typeWriter() {
            if (i < textToType.length) {
                document.getElementById("dialogueText").innerHTML += textToType.charAt(i);
                i++;
                setTimeout(typeWriter, 100);
            } else {
                document.getElementById("choiceContainer").classList.add("visible");
            }
        }
        window.onload = typeWriter;

        const firebaseConfig = {
            apiKey: "AIzaSyCK9fpEXgQ-5Yybwqj_MGq7BGJo0CdmUbk",
            authDomain: "://firebaseapp.com",
            projectId: "the-unknown-limit",
            storageBucket: "the-unknown-limit.firebasestorage.app",
            messagingSenderId: "876638500475",
            appId: "1:876638500475:web:e21bfafb46da2c9cbe94de"
        };
        firebase.initializeApp(firebaseConfig);

        function loginWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            firebase.auth().signInWithPopup(provider).then((result) => {
                alert("ACCESS GRANTED: " + result.user.displayName);
            });
        }

        function goBack() { window.location.href = "index.html"; }
    </script>
</body>
</html>
