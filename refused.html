<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Denied - The Last Road</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: #000;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        /* المقطع في الخلفية */
        #bg-video {
            position: fixed;
            right: 0; bottom: 0;
            min-width: 100%; min-height: 100%;
            z-index: -1;
            object-fit: cover;
        }

        /* تأثير الظلام اللي يفتح ببطء */
        .dark-fade {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 10;
            animation: clearSight 5s forwards;
            pointer-events: none;
        }

        .content {
            position: relative; z-index: 15;
            text-align: center;
            max-width: 85%;
        }

        /* نص الغضب المهتز بلون أحمر */
        .angry-text {
            color: #ff0000;
            font-size: 1.5rem;
            font-weight: bold;
            text-shadow: 0 0 20px #000, 0 0 10px #ff0000;
            margin-bottom: 60px;
            animation: shake 0.1s infinite; /* اهتزاز مجنون */
        }

        .shake-btn {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #444;
            color: #666;
            padding: 12px 45px;
            font-size: 1.1rem;
            cursor: pointer;
            animation: subtleShake 0.1s infinite;
            transition: 0.3s;
        }

        .shake-btn:hover {
            color: #fff;
            border-color: #ff0000;
            box-shadow: 0 0 15px #ff0000;
        }

        @keyframes shake {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            50% { transform: translate(-2px, -1px) rotate(1deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        @keyframes subtleShake {
            0% { transform: translateX(1px); }
            100% { transform: translateX(-1px); }
        }

        @keyframes clearSight {
            0% { opacity: 1; }
            100% { opacity: 0.4; } /* يبقى الجو مظلم ومرعب */
        }
    </style>
</head>
<body>

    <div class="dark-fade"></div>

    <!-- تشغيل فيديو سوبارو تلقائياً -->
    <video autoplay muted loop playsinline id="bg-video">
        <source src="Subaru.mp4" type="video/mp4">
    </video>

    <div class="content">
        <p class="angry-text">
            "من أنت حتى ترفض... أصلاً ما كان مرحب بك، أنت مجرد دخيل أو قروي ضل طريقه!"
        </p>
        
        <button class="shake-btn" onclick="terminate()">اسـتـمـر</button>
    </div>

    <script>
        function terminate() {
            // يطرده لصفحة قوقل
            window.location.href = "https://google.com";
        }
    </script>
</body>
</html>
