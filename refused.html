<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goodbye - The Last Road</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: #000 url('sad.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .eye-fade {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10;
            animation: openEye 5s ease-in-out forwards;
            pointer-events: none;
        }

        .content {
            position: relative; z-index: 15;
            text-align: center;
            max-width: 80%;
        }

        .sad-text {
            color: #add8e6;
            font-size: 1.4rem;
            text-shadow: 0 0 10px rgba(173, 216, 230, 0.4);
            margin-bottom: 50px;
        }

        .exit-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #444;
            color: #666;
            padding: 12px 45px;
            cursor: pointer;
            opacity: 0;
            transition: 0.5s;
        }

        .exit-btn.visible { opacity: 1; }

        @keyframes openEye { 0% { opacity: 1; } 100% { opacity: 0.4; } }
    </style>
</head>
<body onclick="playSadSound()"> <!-- لمس الصفحة يشغل الصوت -->

    <div class="eye-fade"></div>

    <div class="content">
        <h1 class="sad-text" id="typewriter"></h1>
        <button id="exitBtn" class="exit-btn" onclick="terminate()">استمرار...</button>
    </div>

    <!-- ملف الصوت -->
    <audio id="bgAudio">
        <source src="GET OUT.mp3" type="audio/mpeg">
    </audio>

    <script>
        const text = " :( ... اوكيه ما توقعت احد يرفض الصراحه ... ببكي";
        let i = 0;
        let soundStarted = false;

        function playSadSound() {
            if (!soundStarted) {
                const audio = document.getElementById('bgAudio');
                audio.play().catch(e => console.log("الصوت يحتاج تفاعل"));
                soundStarted = true;
            }
        }

        function typeWriter() {
            if (i < text.length) {
                document.getElementById("typewriter").innerHTML += text.charAt(i);
                i++;
                setTimeout(typeWriter, 150);
            } else {
                document.getElementById("exitBtn").classList.add("visible");
            }
        }

        setTimeout(typeWriter, 2000);

        function terminate() {
            window.location.href = "https://google.com";
        }
    </script>
</body>
</html>
