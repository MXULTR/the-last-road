<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goodbye - The Last Road</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: #050505 url('sad.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        /* تفتيح العين ببطء */
        .eye-fade {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10;
            animation: openEye 4s ease-in-out forwards;
            pointer-events: none;
        }

        .content {
            position: relative; z-index: 15;
            text-align: center;
            max-width: 80%;
        }

        /* نص حزين وأزرق باهت */
        .sad-text {
            color: #add8e6; /* Blue Light */
            font-size: 1.4rem;
            text-shadow: 0 0 10px rgba(173, 216, 230, 0.4);
            margin-bottom: 50px;
            min-height: 2em;
        }

        .exit-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #444;
            color: #666;
            padding: 10px 40px;
            cursor: pointer;
            opacity: 0;
            animation: fadeIn 2s forwards 4s;
            transition: 0.5s;
        }

        .exit-btn:hover {
            color: #fff; border-color: #add8e6;
            box-shadow: 0 0 15px rgba(173, 216, 230, 0.2);
        }

        @keyframes openEye { 0% { opacity: 1; } 100% { opacity: 0.4; } }
        @keyframes fadeIn { to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="eye-fade"></div>

    <div class="content">
        <h1 class="sad-text" id="typewriter"></h1>
        <button class="exit-btn" onclick="window.location.href='https://google.com'">استمرار...</button>
    </div>

    <script>
        const text = " :( ... اوكيه ما توقعت احد يرفض الصراحه ... ببكي";
        let i = 0;
        function typeWriter() {
            if (i < text.length) {
                document.getElementById("typewriter").innerHTML += text.charAt(i);
                i++;
                setTimeout(typeWriter, 150); // بطيء وحزين
            }
        }
        // يبدأ الكتابة بعد ما تفتح العين
        setTimeout(typeWriter, 2000);
    </script>
</body>
</html>
