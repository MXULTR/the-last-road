<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Last Road - Headquarters</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            /* 1. الخلفية الثابتة man.gif */
            background-image: url('man.gif'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #000; /* احتياط لو الصورة ما حملت */
            color: #0f0; /* أخضر نيون */
            font-family: 'Cairo', sans-serif; 
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* 2. طبقة حماية خلفية داكنة */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); 
            z-index: 1;
        }

        /* 3. واجهة المقر الرئيسية (مثل ديسكورد) */
        .hq-interface {
            position: relative;
            z-index: 2;
            width: 90%;
            height: 85%;
            background: rgba(0, 15, 0, 0.7); /* شفافة جزئياً */
            border: 1px solid #0f0;
            border-radius: 12px;
            box-shadow: 0 0 25px rgba(0, 255, 0, 0.2);
            display: flex;
            overflow: hidden;
        }

        /* --- Sidebar الشريط الجانبي الأيسر --- */
        .sidebar {
            width: 70px; /* عرض ثابت مثل ديسكورد الجوال */
            height: 100%;
            background: rgba(0, 10, 0, 0.8);
            border-left: 1px solid #0f0;
            padding: 15px 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between; /* النجمة في الأسفل */
        }

        .server-icons-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
        }

        /* صورة بروفايل LainProf.jpeg */
        .profile-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-image: url('lain prof.jpeg');
            background-size: cover;
            background-position: center;
            border: 2px solid #0f0;
            box-shadow: 0 0 10px #0f0;
            cursor: pointer;
        }

        /* أيقونات الرومات الشفافة # */
        .room-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid #0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0f0;
            font-size: 1.5rem;
            cursor: pointer;
            transition: background 0.3s;
        }

        .room-icon:hover, .room-icon.active {
            background: rgba(0, 255, 0, 0.3);
        }

        /* أيقونة النجمة في الأسفل */
        .star-icon {
            font-size: 2rem;
            color: #ff0; /* أصفر نجمة */
            text-shadow: 0 0 10px #ff0;
            cursor: pointer;
            margin-bottom: 10px;
        }

        /* --- مساحة المحتوى الرئيسية --- */
        .main-content {
            flex-grow: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 15px 20px;
            border-bottom: 1px solid #0f0;
            font-weight: bold;
            font-size: 1.2rem;
            background: rgba(0, 10, 0, 0.5);
        }

        .chat-messages {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            background: rgba(0, 255, 0, 0.05);
            padding: 10px 15px;
            border-radius: 8px;
            border-right: 2px solid transparent;
        }

        .message.system {
            border-right-color: #0f0;
            color: rgba(0, 255, 0, 0.8);
        }

        .message-author {
            font-weight: bold;
            margin-bottom: 5px;
            color: #0f0;
        }

        .chat-input-area {
            padding: 15px;
            border-top: 1px solid #0f0;
            background: rgba(0, 5, 0, 0.8);
        }

        .chat-input {
            width: 100%;
            background: rgba(0, 20, 0, 0.6);
            border: 1px solid #0f0;
            border-radius: 8px;
            padding: 12px;
            color: #0f0;
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box; /* حماية الأبعاد */
        }

        /* --- Ash Quick Screen Overlay (مخفية افتراضياً) --- */
        #ash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('ash.jpg'); /* لاين على الكمبيوتر */
            background-size: cover;
            background-position: center;
            z-index: 1000; /* فوق كل شيء */
            display: none; /* مخفية */
            align-items: center;
            justify-content: center;
            cursor: pointer; /* للإشارة أنه يمكن إغلاقها */
        }

        .ash-dialog {
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #0f0;
            border-radius: 12px;
            padding: 30px;
            max-width: 80%;
            text-align: center;
            box-shadow: 0 0 30px #0f0;
        }

        .ash-text {
            color: #0f0;
            font-size: 1.4rem;
            line-height: 1.6;
            text-shadow: 0 0 10px #0f0;
            margin-bottom: 15px;
        }

        .ash-tip {
            color: rgba(0, 255, 0, 0.6);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <div class="hq-interface">
        
        <div class="sidebar">
            <div class="server-icons-group">
                <div class="profile-icon" title="The Last Road"></div>
                
                <div class="room-icon active" title="#1 كلام عشوائي">#</div>
                <div class="room-icon" title="#2 الأرشيف السري">#</div>
                <div class="room-icon" title="رسالة المطور" onclick="showAshScreen()">?</div>
            </div>
            
            <div class="star-icon" title="تحديات النظام">&#x2B50;</div>
        </div>

        <div class="main-content">
            <div class="chat-header">#1 كلام عشوائي</div>
            
            <div class="chat-messages">
                <div class="message system">النظام بانتظار مساهماتك...</div>
                
                <div class="message">
                    <div class="message-author">[النظام]</div>
                    تم التحقق من هوية العضو: MX. مرحباً بك في المقر.
                </div>
            </div>
            
            <div class="chat-input-area">
                <input type="text" class="chat-input" placeholder="اكتب رسالتك هنا...">
            </div>
        </div>

    </div>

    <div id="ash-screen" onclick="hideAshScreen()">
        <div class="ash-dialog">
            <div class="ash-text" id="typewriterText"></div>
            <div class="ash-tip">[انقر في أي مكان للإغلاق]</div>
        </div>
    </div>

    <script>
        const messageToType = "هيه! باقي اشتغل ما خلصة ، قفل الباب وراك";
        let textIndex = 0;
        const typingSpeed = 80; // سرعة الكتابة
        let typingInterval;

        // دالة الكتابة ببطء
        function typeWriter() {
            if (textIndex < messageToType.length) {
                document.getElementById("typewriterText").innerHTML += messageToType.charAt(textIndex);
                textIndex++;
            } else {
                clearInterval(typingInterval);
            }
        }

        // دالة لإظهار شاشة آش (يدوياً)
        function showAshScreen() {
            document.getElementById("typewriterText").innerHTML = ""; // مسح النص القديم
            textIndex = 0;
            document.getElementById("ash-screen").style.display = "flex";
            clearInterval(typingInterval); // حماية من تداخل المؤقتات
            typingInterval = setInterval(typeWriter, typingSpeed);
        }

        // دالة لإخفاء شاشة آش
        function hideAshScreen() {
            document.getElementById("ash-screen").style.display = "none";
            clearInterval(typingInterval);
        }

        // إضافة حدث لإغلاق شاشة آش عند الضغط على أي زر لوحة مفاتيح
        window.onkeydown = function(e) {
            if (document.getElementById('ash-screen').style.display === 'flex') {
                hideAshScreen();
            }
        }

        // هام جداً: لا يوجد أي كود هنا يفتح الشاشة تلقائياً عند التحميل!
    </script>
</body>
</html>
