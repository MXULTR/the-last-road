<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Last Road - Base Headquarters</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            /* 1. الخلفية الثابتة matrix code (مثال: man.gif) */
            background-image: url('man.gif'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #000; /* احتياط لو الصورة ما حملت */
            color: #0f0; /* أخضر نيون */
            font-family: 'Cairo', sans-serif; 
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* 2. طبقة حماية داكنة (Overlay) لجعل الواجهة واضحة */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); 
            z-index: 1;
        }

        /* 3. واجهة المقر الرئيسية (مثل ديسكورد) */
        .hq-interface {
            position: relative;
            z-index: 2;
            width: 90%;
            height: 85%;
            background: rgba(0, 15, 0, 0.7); /* شفافة جزئياً (70-80%) */
            border: 1px solid #0f0;
            border-radius: 12px;
            box-shadow: 0 0 25px rgba(0, 255, 0, 0.2);
            display: flex;
            overflow: hidden;
        }

        /* --- Sidebar الشريط الجانبي الأيسر --- */
        .sidebar {
            width: 80px; /* عرض ثابت مثل ديسكورد */
            height: 100%;
            background: rgba(0, 10, 0, 0.8);
            border-left: 1px solid #0f0;
            padding: 15px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between; /* الأيقونات في الأسفل */
        }

        .server-icons-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
        }

        /* أيقونة خادم ديسكورد (Discord.jpg) */
        .discord-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-image: url('Discord.jpg'); /* شعار ديسكورد الكلاسيكي */
            background-size: cover;
            background-position: center;
            border: 2px solid #0f0;
            box-shadow: 0 0 10px #0f0;
            cursor: pointer;
        }

        /* أيقونات الرومات الشفافة المستديرة */
        .room-icon-list {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
        }

        .room-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid #0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0f0;
            font-size: 1.5rem;
            cursor: pointer;
            transition: background 0.3s, transform 0.3s;
        }

        .room-icon:hover {
            background: rgba(0, 255, 0, 0.3);
            transform: scale(1.1);
        }

        /* صورة بروفايل LainProf.jpeg */
        .profile-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-image: url('lain prof.jpeg');
            background-size: cover;
            background-position: center;
            border: 2px solid transparent; /* حماية الأبعاد */
            cursor: pointer;
        }

        /* الأيقونات في الأسفل الأيمن (النجمة، البحث) */
        .bottom-icons {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
        }

        .achievement-icon {
            font-size: 2.5rem;
            color: #ff0; /* أصفر نجمة */
            text-shadow: 0 0 15px #ff0;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .achievement-icon:hover {
            transform: scale(1.1);
        }

        .search-icon {
            font-size: 1.5rem;
            color: rgba(0, 255, 0, 0.6);
            cursor: pointer;
        }

        /* --- مساحة المحتوى الرئيسية --- */
        .main-content {
            flex-grow: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 15px 20px;
            border-bottom: 1px solid #0f0;
            font-weight: bold;
            font-size: 1.2rem;
            background: rgba(0, 10, 0, 0.5);
        }

        .chat-messages {
            flex-grow: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            text-align: right;
        }

        .system-message {
            color: #0f0;
            text-shadow: 0 0 10px #0f0;
            font-size: 1.1rem;
            margin-bottom: 10px;
        }

        .central-text {
            color: rgba(0, 255, 0, 0.7);
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
            font-size: 1.1rem;
            margin-bottom: 20px;
        }

        /* مؤشر كتابة نابض */
        .typing-cursor {
            color: #0f0;
            font-weight: bold;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .chat-input-area {
            padding: 15px;
            border-top: 1px solid #0f0;
            background: rgba(0, 5, 0, 0.8);
        }

        .chat-input {
            width: 100%;
            background: rgba(0, 20, 0, 0.6);
            border: 1px solid #0f0;
            border-radius: 8px;
            padding: 12px;
            color: #0f0;
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box; /* حماية الأبعاد */
        }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <div class="hq-interface">
        
        <div class="sidebar">
            <div class="server-icons-group">
                <div class="discord-icon" title="Discord.jpg"></div>
                
                <div class="room-icon-list">
                    <div class="room-icon active" title="#1 كلام عشوائي">#</div>
                    <div class="room-icon" title="#2 الأرشيف السري">#</div>
                    <div class="room-icon" title="صوتية">🔊</div>
                    <div class="profile-icon" title="LainProf.jpeg"></div>
                    <div class="room-icon" title="خادم آخر">#</div>
                </div>
            </div>
            
            <div class="bottom-icons">
                <div class="search-icon" title="بحث">&#x1F50D;</div> <div class="achievement-icon" title="تحديات النظام">&#x2B50;</div> </div>
        </div>

        <div class="main-content">
            <div class="chat-header">#1 كلام عشوائي</div>
            
            <div class="chat-messages">
                <div class="system-message">النظام بانتظار مساهماتك...</div>
                
                <div class="central-text">
                    [MX]: هيه! باقي اشتغل ما خلصة ، قفل الباب وراك
                </div>
                
                <div class="central-text">
                    (جاري الاتصال... النظام بانتظار مساهماتك)
                </div>
                
                <div class="typing-cursor">]</div>
            </div>
            
            <div class="chat-input-area">
                <input type="text" class="chat-input" placeholder="اكتب رسالتك هنا">
            </div>
        </div>

    </div>

    <script>
        const messageToType = "هيه! باقي اشتغل ما خلصة ، قفل الباب وراك";
        let textIndex = 0;
        const typingSpeed = 80; // سرعة الكتابة
        let typingInterval;

        // دالة الكتابة ببطء لرسالة MX (مدمجة)
        function typeWriter() {
            if (textIndex < messageToType.length) {
                document.getElementById("typewriterText").innerHTML += messageToType.charAt(textIndex);
                textIndex++;
            } else {
                clearInterval(typingInterval);
            }
        }

        // هام جداً: لا يوجد أي كود هنا يفتح الشاشة تلقائياً عند التحميل!
    </script>
</body>
</html>
