<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Last Road - Headquarters</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* =========================================
           1. الخلفية الأساسية (خارج الواجهة)
           ========================================= */
        body {
            margin: 0;
            padding: 0;
            background-image: url('man.gif'); /* الـ GIF الخاص بك */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #000;
            color: #0f0;
            font-family: 'Cairo', monospace;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* طبقة تعتيم خفيفة جداً لضمان بروز الواجهة */
        .page-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: 1;
        }

        /* =========================================
           2. الحاوية الزجاجية (تستخدم صورتك المرفوعة)
           ========================================= */
        .glass-container {
            position: relative;
            z-index: 2;
            width: 90%;
            height: 85%;
            /* استخدام المربع الشفاف الذي رفعته */
            background-image: url('chat-panel.png');
            background-size: 100% 100%; /* تمدد لملء الحاوية */
            background-repeat: no-repeat;
            display: flex;
            border-radius: 15px; /* تنعيم الأطراف */
            overflow: hidden; /* لمنع خروج المحتوى عن الإطار */
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.1);
        }

        /* =========================================
           3. الشريط الجانبي الأيمن (شريط السيرفرات)
           ========================================= */
        .servers-sidebar {
            width: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            border-left: 1px solid rgba(0, 255, 0, 0.2);
            background: rgba(0, 10, 0, 0.4); /* تعتيم خفيف فوق الزجاج */
        }

        .server-icon {
            width: 55px;
            height: 55px;
            background-image: url('lain-prof.png'); /* الأيقونة المرفوعة */
            background-size: cover;
            background-position: center;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
        }

        .server-icon:hover {
            transform: scale(1.1);
            box-shadow: 0 0 15px #0f0;
        }

        .sidebar-spacer {
            flex-grow: 1; /* لدفع الأيقونة التالية للأسفل */
        }

        .bottom-icon {
            width: 50px;
            height: 50px;
            background-image: url('challenges-icon.png'); /* أيقونة التحديات المرفوعة */
            background-size: cover;
            background-position: center;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .bottom-icon:hover {
            transform: scale(1.1);
        }

        /* =========================================
           4. قائمة الرومات (بجوار شريط السيرفرات)
           ========================================= */
        .channels-panel {
            width: 240px;
            background: rgba(0, 15, 0, 0.3);
            border-left: 1px solid rgba(0, 255, 0, 0.2);
            display: flex;
            flex-direction: column;
            padding: 15px;
        }

        .server-header {
            font-weight: bold;
            font-size: 1.1rem;
            text-shadow: 0 0 5px #0f0;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(0, 255, 0, 0.2);
        }

        .channel {
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
            cursor: pointer;
            color: rgba(0, 255, 0, 0.7);
            transition: background 0.2s, color 0.2s;
        }

        .channel:hover, .channel.active {
            background: rgba(0, 255, 0, 0.1);
            color: #0f0;
        }

        .star-channel-icon {
            width: 60px;
            height: 60px;
            background-image: url('lain-star.png'); /* الأيقونة الثالثة المرفوعة */
            background-size: cover;
            background-position: center;
            border-radius: 50%;
            margin-top: 20px;
            align-self: center;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .star-channel-icon:hover {
            transform: rotate(15deg) scale(1.1);
        }

        /* =========================================
           5. منطقة الدردشة (Chat Area)
           ========================================= */
        .chat-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .chat-header-top {
            padding: 15px 20px;
            border-bottom: 1px solid rgba(0, 255, 0, 0.2);
            font-weight: bold;
            font-size: 1.2rem;
        }

        .chat-content {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .msg-box {
            font-size: 1.1rem;
            line-height: 1.6;
            text-shadow: 0 0 8px rgba(0, 255, 0, 0.5);
        }

        .msg-author {
            color: #fff;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .typing-cursor {
            display: inline-block;
            font-weight: bold;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .chat-input-container {
            padding: 20px;
            border-top: 1px solid rgba(0, 255, 0, 0.2);
        }

        .chat-input {
            width: 100%;
            background: rgba(0, 20, 0, 0.5);
            border: 1px solid rgba(0, 255, 0, 0.4);
            border-radius: 8px;
            padding: 15px;
            color: #0f0;
            font-family: 'Cairo', monospace;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
        }

        .chat-input::placeholder {
            color: rgba(0, 255, 0, 0.4);
        }
    </style>
</head>
<body>

    <audio id="bgMusic" src="mz.mp3" autoplay loop></audio>

    <div class="page-overlay"></div>

    <div class="glass-container">
        
        <div class="servers-sidebar">
            <div class="server-icon" title="The Last Road"></div>
            <div class="sidebar-spacer"></div>
            <div class="bottom-icon" title="الإنجازات"></div>
        </div>

        <div class="channels-panel">
            <div class="server-header">The Last Road</div>
            <div class="channel active"># كلام عشوائي</div>
            <div class="channel"># مالي خلق احط اسم</div>
            <div class="star-channel-icon" title="مساحة فارغة"></div>
        </div>

        <div class="chat-area">
            <div class="chat-header-top"># كلام عشوائي</div>
            
            <div class="chat-content" id="chatHistory">
                </div>
            
            <div class="chat-input-container">
                <input type="text" class="chat-input" placeholder="النظام لا يستقبل مدخلات حالياً..." disabled>
            </div>
        </div>

    </div>

    <script>
        // تشغيل الموسيقى فوراً (تتطلب تفاعل المستخدم في بعض المتصفحات)
        window.addEventListener('click', () => {
            document.getElementById('bgMusic').play();
        }, { once: true });

        // --- نظام الترحيب السينمائي (Cutscene) ---
        const chatHistory = document.getElementById('chatHistory');
        
        // نصوص المشهد
        const sceneData = [
            { author: "[النظام]", text: "اوه اهلا! اول زائر اظنك هنا ... حياك :)", delay: 1000 },
            { author: "[MX]", text: "هيه! باقي اشتغل ما خلصة ، قفل الباب وراك", delay: 3500 },
            { author: "[النظام]", text: "(جاري الاتصال... النظام بانتظار مساهماتك)", delay: 6500 }
        ];

        function typeMessage(author, text, startDelay) {
            setTimeout(() => {
                const msgDiv = document.createElement('div');
                msgDiv.className = 'msg-box';
                
                const authorDiv = document.createElement('div');
                authorDiv.className = 'msg-author';
                authorDiv.innerText = author;
                
                const textSpan = document.createElement('span');
                const cursorSpan = document.createElement('span');
                cursorSpan.className = 'typing-cursor';
                cursorSpan.innerText = ' ]';

                msgDiv.appendChild(authorDiv);
                msgDiv.appendChild(textSpan);
                msgDiv.appendChild(cursorSpan);
                chatHistory.appendChild(msgDiv);

                let i = 0;
                const typingInterval = setInterval(() => {
                    textSpan.innerText += text.charAt(i);
                    i++;
                    chatHistory.scrollTop = chatHistory.scrollHeight; // النزول لأسفل الشات
                    
                    if (i >= text.length) {
                        clearInterval(typingInterval);
                        // إزالة المؤشر بعد الانتهاء من الكتابة إلا للرسالة الأخيرة
                        if (text !== sceneData[sceneData.length - 1].text) {
                            cursorSpan.remove();
                        }
                    }
                }, 50); // سرعة الكتابة

            }, startDelay);
        }

        // تشغيل المشهد بمجرد تحميل الصفحة
        window.onload = () => {
            sceneData.forEach(scene => {
                typeMessage(scene.author, scene.text, scene.delay);
            });
            
            // تفعيل حقل الإدخال بعد انتهاء المشهد
            setTimeout(() => {
                const inputField = document.querySelector('.chat-input');
                inputField.disabled = false;
                inputField.placeholder = "اكتب رسالتك هنا...";
            }, 8000);
        };
    </script>
</body>
</html>
