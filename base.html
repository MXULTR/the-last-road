<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Last Road - Headquarters</title>
    <style>
        /* التنسيق الأساسي للمقر */
        body {
            margin: 0;
            padding: 0;
            background-color: #050505; /* لون خلفية افتراضي عميق */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: background 0.5s ease-in-out; /* حركة ناعمة عند تغيير الخلفية */
        }

        /* طبقة حماية لجعل النصوص واضحة فوق أي خلفية */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); 
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 2;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            text-shadow: 0 0 20px #0f0;
            letter-spacing: 5px;
            margin-bottom: 10px;
        }

        /* لوحة التحكم (مخفية افتراضياً وتظهر بلمستك) */
        #dev-panel {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(15, 15, 15, 0.95);
            border: 1px dashed #0f0;
            padding: 20px;
            border-radius: 10px;
            z-index: 1000;
            width: 280px;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.2);
            display: none; /* تظهر عند الضغط على الزر */
        }

        input {
            width: 90%;
            padding: 8px;
            margin: 10px 0;
            background: #222;
            border: 1px solid #444;
            color: #0f0;
            border-radius: 5px;
        }

        .btn-apply {
            background: #0f0;
            color: #000;
            border: none;
            padding: 10px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
        }

        .toggle-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1001;
            background: #000;
            color: #0f0;
            border: 1px solid #0f0;
            padding: 10px;
            cursor: pointer;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <div class="content">
        <h1 id="welcome-text">THE HEADQUARTERS</h1>
        <p id="status-text">جاري فحص تصريح الدخول...</p>
    </div>

    <button class="toggle-btn" onclick="togglePanel()">🛠</button>

    <div id="dev-panel">
        <h3 style="color: #0f0; margin-top: 0;">ورشة التصميم 🎨</h3>
        <label>رابط الخلفية (Image/GIF):</label>
        <input type="text" id="bgInput" placeholder="https://...">
        
        <label>رابط الموسيقى (MP3):</label>
        <input type="text" id="musicInput" placeholder="https://...">

        <label>شفافية الواجهة (Blur):</label>
        <input type="range" id="blurRange" min="0" max="20" value="0" oninput="applyBlur()">
        
        <button class="btn-apply" onclick="applyChanges()">تطبيق التعديلات</button>
    </div>

    <audio id="bg-audio" loop></audio>

    <script>
        // دالة إظهار وإخفاء اللوحة
        function togglePanel() {
            const panel = document.getElementById('dev-panel');
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        }

        // تطبيق التغييرات فوراً
        function applyChanges() {
            const bg = document.getElementById('bgInput').value;
            const music = document.getElementById('musicInput').value;
            const audio = document.getElementById('bg-audio');

            if(bg) {
                document.body.style.backgroundImage = `url('${bg}')`;
            }
            if(music) {
                audio.src = music;
                audio.play();
            }
            alert("تم التحديث بنجاح! جرب الشكل الآن.");
        }

        // دالة إضافية لتغيير حدة التركيز (Blur)
        function applyBlur() {
            const blurValue = document.getElementById('blurRange').value;
            document.querySelector('.overlay').style.backdropFilter = `blur(${blurValue}px)`;
        }

        // استرجاع الكود من LocalStorage (اختياري: إذا أردت أن يتذكرك الموقع)
        window.onload = () => {
            const savedCode = localStorage.getItem('access_code');
            if(savedCode) {
                document.getElementById('status-text').innerText = "مرحباً بك مجدداً، إكس.";
            }
        };
    </script>
</body>
</html>
