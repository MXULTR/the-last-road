<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Last Road - المقر الرئيسي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            /* 1. الخلفية الكلية (man.gif) */
            background-image: url('man.gif'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #0f0; /* اللون الأخضر الكلاسيكي لشاشات الاختراق */
            font-family: 'Cairo', 'Courier New', Courier, monospace; 
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: background 0.5s ease-in-out;
        }

        /* 2. طبقة حماية (Overlay) شفافة لجعل الواجهة واضحة */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); /* اسود شفاف بنسبة 60% */
            z-index: 1;
        }

        /* 3. واجهة المقر (Discord-like UI)، شفافة بنسبة 70% */
        .hq-interface {
            position: relative;
            z-index: 2;
            width: 80%;
            height: 80%;
            background: rgba(0, 20, 0, 0.7); /* خلفية داكنة شفافة */
            border: 1px solid #0f0;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
            display: flex;
            overflow: hidden;
        }

        /* --- Sidebar الأيسر --- */
        .sidebar {
            width: 15%;
            height: 100%;
            border-left: 1px solid #0f0;
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
        }

        /* أيقونة السيرفر (استبدال Discord بشعار بروفايل Lain Prof.jpeg) */
        .server-icon {
            width: 80%;
            aspect-ratio: 1;
            border-radius: 50%;
            background-image: url('lain prof.jpeg'); /* صورة بروفايل لاين */
            background-size: cover;
            background-position: center;
            border: 2px solid #0f0;
            margin-bottom: 20px;
            box-shadow: 0 0 10px #0f0;
        }

        .room-icons {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            flex-grow: 1;
        }

        .room-icon {
            width: 60%;
            aspect-ratio: 1;
            border-radius: 50%;
            background: rgba(0, 255, 0, 0.2);
            border: 1px solid transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
            transition: border 0.3s, background 0.3s;
        }

        .room-icon:hover {
            border: 1px solid #0f0;
            background: rgba(0, 255, 0, 0.3);
        }

        /* قسم التحديات (إنجازات Sony/Steam) */
        .achievement-icon {
            font-size: 2.5rem;
            text-shadow: 0 0 10px #0f0;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .achievement-icon:hover {
            transform: scale(1.1);
        }

        /* --- مساحة المحادثة والمحتوى --- */
        .chat-area {
            width: 85%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 15px;
            border-bottom: 1px solid #0f0;
            text-align: right;
            font-weight: bold;
            font-size: 1.3rem;
        }

        .chat-messages {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            text-align: right;
        }

        .status-text {
            color: #0f0;
            text-shadow: 0 0 10px #0f0;
            margin-bottom: 15px;
            font-size: 1rem;
        }

        .chat-input {
            padding: 15px;
            border-top: 1px solid #0f0;
            display: flex;
            gap: 10px;
        }

        input {
            flex-grow: 1;
            background: rgba(0, 20, 0, 0.5);
            border: 1px solid #0f0;
            color: #0f0;
            padding: 12px;
            text-align: right;
            border-radius: 5px;
            outline: none;
        }

        /* --- Ash Quick Screen (Overlay) --- */
        #ash-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('ash.jpg'); /* شاشة Quick Screen (لاين والكمبيوتر) */
            background-size: cover;
            background-position: center;
            z-index: 100; /* تطفو فوق المقر */
            display: none; /* تظهر عند الاستدعاء */
            align-items: center;
            justify-content: center;
        }

        #ash-screen .ash-dialog {
            background: rgba(0, 0, 0, 0.85); /* اسود داكن جداً شفاف */
            border: 2px solid #0f0;
            border-radius: 10px;
            padding: 30px;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 0 30px #0f0;
        }

        .ash-text {
            color: #0f0;
            text-shadow: 0 0 10px #0f0;
            margin-bottom: 20px;
            font-size: 1.3rem;
            line-height: 1.6;
        }

        .ash-tip {
            color: rgba(0, 255, 0, 0.6);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <div class="hq-interface">
        
        <div class="sidebar">
            <div class="room-icons">
                <div class="server-icon" title="The Last Road"></div>
                
                <div class="room-icon" title="روم كـلام عـشـوائـي" onclick="loadRoom('#1 كلام عشوائي')">#</div>
                <div class="room-icon" title="روم الأرـشـيـف الـسـري" onclick="loadRoom('#2 الأرشيف السري')">#</div>
                <div class="room-icon" title="روم الإنجازات" onclick="openChallenges()">#</div>
                <div class="room-icon" title="سكرين آش السريع" onclick="openAshScreen()">#</div>
            </div>
            
            <div class="achievement-icon" title="تحديات النظام" onclick="openChallenges()">&#x2B50;</div> </div>

        <div class="chat-area">
            <div class="chat-header" id="currentRoomName">#1 كلام عشوائي</div>
            <div class="chat-messages" id="chatContent">
                <div class="status-text">النظام ينتظر مـفتـاح العبـــور...</div>
                <div class="status-text">(جاري الاتصال... النظام بانتظار مساهماتك)</div>
            </div>
            <div class="chat-input">
                <input type="text" placeholder="اكتب رسالتك هنا">
            </div>
        </div>

    </div>

    <div id="ash-screen">
        <div class="ash-dialog">
            <div class="ash-text" id="mxMessage"></div>
            <div class="ash-tip">[اضغط أي زر للخروج]</div>
        </div>
    </div>

    <script>
        // 1. النص العربي الـ "رايق" الخاص بك ورسالة MX
        const SECRET_KEY = "unknown limit";
        const mxMessageText = "هيه! باقي اشتغل ما خلصة ، قفل الباب وراك";

        let chatIndex = 0;
        let charIndex = 0;
        const typingSpeed = 70; // سرعة الكتابة

        // دالة الكتابة ببطء (Typewriter effect) لرسالة MX
        function typeWriterMX() {
            if (charIndex < mxMessageText.length) {
                document.getElementById("mxMessage").innerHTML += mxMessageText.charAt(charIndex);
                charIndex++;
                setTimeout(typeWriterMX, typingSpeed);
            }
        }

        // دالة تحميل روم معين
        function loadRoom(roomName) {
            document.getElementById('currentRoomName').innerText = roomName;
            document.getElementById('chatContent').innerHTML = `<div class="status-text">تم تحميل ${roomName}. النظام بانتظار مساهماتك...</div>`;
            closeAshScreen(); // إغلاق أي سكرين مفتوح عند تغيير الروم
        }

        // دالة فتح قسم التحديات (لتعريفها لاحقاً)
        function openChallenges() {
            alert("قسم التحديات ما زال قيد البرمجة... انتظر قليلاً.");
        }

        // دالة فتح سكرين آش السريع (Ash Quick Screen)
        function openAshScreen() {
            const ashScreen = document.getElementById('ash-screen');
            ashScreen.style.display = 'flex';
            document.getElementById("mxMessage").innerHTML = ""; // مسح النص القديم
            charIndex = 0;
            typeWriterMX(); // بدء تأثير الكتابة ببطء
        }

        // دالة إغلاق سكرين آش عند الضغط على أي زر
        function closeAshScreen() {
            document.getElementById('ash-screen').style.display = 'none';
        }

        // تسجيل تفاعل لإغلاق سكرين آش
        window.onclick = (e) => {
            if (e.target.id === 'ash-screen') {
                closeAshScreen();
            }
        }

        // إضافة حدث لإغلاق سكرين آش عند الضغط على أي زر لوحة مفاتيح
        window.onkeydown = (e) => {
            if (document.getElementById('ash-screen').style.display === 'flex') {
                closeAshScreen();
            }
        }

        // تشغيل الكتابة ببطء عند تحميل الصفحة لفتح سكرين آش افتراضياً كبداية
        window.onload = () => {
            openAshScreen(); // فتح السكرين الكوميدي كترحيب
        }
    </script>
</body>
</html>
